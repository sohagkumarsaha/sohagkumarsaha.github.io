<!-- Theme pre-apply: prevent flash of wrong theme -->
<script>
  (function () {
    var saved = localStorage.getItem('theme-preference');
    var dark;
    if (saved === 'dark') { dark = true; }
    else if (saved === 'light') { dark = false; }
    else {
      var h = parseInt(new Date().toLocaleString('en-US', { timeZone: 'America/Chicago', hour: 'numeric', hour12: false }), 10);
      dark = (h < 6 || h >= 20);
    }
    document.documentElement.classList.add(dark ? 'dark-mode' : 'light-mode');
  })();
</script>
