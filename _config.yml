theme: minimal-mistakes-jekyll
minimal_mistakes_skin: "default"

# Site Settings
locale: "en-US"
title: "Sohag Kumar Saha"
title_separator: "|"
subtitle: "Ph.D. Researcher | IEEE Senior Member"
name: "Sohag Kumar Saha"
description: >-
  Ph.D. Researcher in Electrical & Computer Engineering at Tennessee Technological University.
  Research interests: Smart Grid, Energy Management Systems, Renewable Energy, Deep Reinforcement Learning.
url: "https://sohagkumarsaha.github.io"
baseurl: ""
repository: "sohagkumarsaha/sohagkumarsaha.github.io"
logo: ""
masthead_title: "Sohag Kumar Saha"
search: true
search_provider: lunr

# Breadcrumbs
breadcrumbs: false

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
paginate: 5
paginate_path: /blog/page:num/
show_excerpts: true
timezone: America/Chicago

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-scholar

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Jekyll Scholar Settings
scholar:
  style: apa
  locale: en
  sort_by: year
  order: descending
  source: ./_bibliography
  bibliography: references.bib
  bibliography_template: bibtemplate
  replace_strings: true
  join_strings: true
  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details
  query: "@*"

# Custom scripts loaded after MM's main.min.js
after_footer_scripts:
  - /assets/js/copy-code.js
  - /assets/js/theme-switcher.js

# Comments (Giscus — GitHub Discussions)
comments:
  provider: "giscus"
  giscus:
    repo_id: "R_kgDOSZx8-g"
    category_name: "General"
    category_id: "DIC_kwDOSZx8-s4C8v2n"
    discussion_term: "pathname"
    reactions_enabled: "1"
    theme: "preferred_color_scheme"

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
      toc: true
      toc_sticky: true
      toc_label: "On This Page"
      toc_icon: "bookmark"
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

# Author
author:
  name: "Sohag Kumar Saha"
  avatar: "/assets/images/profile.jpg"
  bio: >-
    Ph.D. Researcher in ECE · IEEE Senior Member · Smart Grid & Energy Researcher ·
    Graduate Research Assistant, Tennessee Tech University
  location: "Cookeville, TN, USA"
  email: "sohag@ieee.org"
