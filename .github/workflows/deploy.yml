name: Deploy Jekyll Site to GitHub Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build main site
        working-directory: main
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging

      - name: Build staging site
        working-directory: staging
        run: bundle exec jekyll build --baseurl "/staging" --destination ../_site_staging
        env:
          JEKYLL_ENV: production

      - name: Combine main and staging outputs
        run: |
          mkdir -p _site
          cp -r main/_site/* _site/
          mkdir -p _site/staging
          cp -r _site_staging/* _site/staging/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
