name: Deploy Jekyll Site to GitHub Pages

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install gems (main)
        working-directory: main
        run: bundle install

      - name: Build main site (production)
        working-directory: main
        run: bundle exec jekyll build --baseurl ""
        env:
          JEKYLL_ENV: production

      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          path: staging

      - name: Install gems (staging)
        working-directory: staging
        run: bundle install

      - name: Build staging site (preview)
        working-directory: staging
        run: bundle exec jekyll build --baseurl "/staging" --destination ../_site_staging
        env:
          JEKYLL_ENV: production

      - name: Combine outputs (main + /staging)
        run: |
          echo "Building combined site structure..."
          mkdir -p _site
          echo "Copying main site..."
          cp -r main/_site/* _site/
          echo "Creating staging subdirectory..."
          mkdir -p _site/staging
          echo "Copying staging site..."
          if [ -d "_site_staging" ]; then
            cp -r _site_staging/* _site/staging/
            echo "✓ Staging site copied successfully"
          else
            echo "WARNING: _site_staging directory not found!"
            ls -la
            exit 1
          fi
          echo "✓ Main site deployed to: https://sohagkumarsaha.github.io"
          echo "✓ Staging site deployed to: https://sohagkumarsaha.github.io/staging"

      - name: Upload artifact
        id: upload
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
